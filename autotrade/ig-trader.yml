name: dax-ig-trader
on:
  schedule:
    - cron: '5 7 * * 1-5'    # 9:05 CEST (verano) - evaluar y abrir
    - cron: '5 8 * * 1-5'    # 9:05 CET (invierno) - fuera de ventana se descarta solo
    - cron: '31 8 * * 1-5'   # 10:31 CEST - cierre por tiempo / reconciliar TP-SL
    - cron: '31 9 * * 1-5'   # 10:31 CET
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ig-trader.mjs auto
        env:
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_ENV: ${{ secrets.IG_ENV }}
      - run: |
          git config user.name "dax-bot"
          git config user.email "dax-bot@users.noreply.github.com"
          git add trades-ig.json || true
          git commit -m "trade $(date -u +%F_%H%M)" || echo "sin cambios"
          git push
