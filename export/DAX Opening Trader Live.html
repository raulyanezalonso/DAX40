flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ newsFilters }}\" as=\"nf\" hint-placeholder-count=\"3\">\n              <button data-f=\"{{ nf.k }}\" sc-camel-on-click=\"{{ onNewsFilter }}\" aria-pressed=\"{{ nf.pressed }}\" style=\"padding:3px 9px;border-radius:999px;border:1px solid {{ nf.bord }};background:{{ nf.bg }};color:{{ nf.col }};font-size:9.5px;font-weight:700;cursor:pointer;transition:all 0.2s\">{{ nf.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:9.5px;color:#64748b;margin-bottom:6px;font-family:'IBM Plex Mono',monospace\">{{ newsStatus }}<\u002Fdiv>\n          <div style=\"display:grid;gap:7px;max-height:380px;overflow-y:auto\">\n            <sc-for list=\"{{ articles }}\" as=\"ar\" hint-placeholder-count=\"5\">\n              <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 10px\">\n                <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap\">\n                  <span style=\"font-size:9px;font-weight:800;padding:1.5px 6px;border-radius:4px;background:{{ ar.tagBg }};color:{{ ar.tagCol }};white-space:nowrap\">{{ ar.tag }}<\u002Fspan>\n                  <span style=\"font-size:9px;color:#475569;font-family:'IBM Plex Mono',monospace\">{{ ar.when }} · {{ ar.domain }}<\u002Fspan>\n                  <span style=\"margin-left:auto;font-size:9.5px;font-weight:700;color:{{ ar.impCol }};font-family:'IBM Plex Mono',monospace\" data-tip=\"Impacto estimado del titular sobre el índice = severidad (léxico EN/DE, ±1 a ±3) × peso de la empresa en el DAX × recencia (semivida ~9 h). Los titulares macro/geo sin empresa asignada solo muestran polaridad.\">{{ ar.impStr }}<\u002Fspan>\n                <\u002Fdiv>\n                <a href=\"{{ ar.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:11px;line-height:1.45;color:#cbd5e1;font-weight:600;display:block\" style-hover=\"color:#7dd3fc\">{{ ar.title }}<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ newsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:14px;border:1px dashed #334155;border-radius:9px;text-align:center;font-size:11px;color:#64748b\">{{ newsEmptyMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Geopolítica\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px;min-width:0\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px\">\n            <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Geopolítica · cuantificada<\u002Fh2>\n            <span style=\"font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(2,6,23,0.5);color:{{ geoScoreCol }};font-family:'IBM Plex Mono',monospace;border:1px solid #1e293b\" data-tip=\"Suma de la puntuación de cada titular geopolítico de 16 h: −2 por guerra/misiles/ataque/nuclear, −1 por sanciones/aranceles/escalada, +1,5 por alto el fuego/acuerdo/distensión. Acotado −10…+6. Entra en el modelo × 0,05 con sesgo asimétrico (bloque Geopolítica).\">SCORE {{ geoScoreStr }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;gap:6px\">\n            <sc-for list=\"{{ geoRows }}\" as=\"ge\" hint-placeholder-count=\"4\">\n              <a href=\"{{ ge.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display:block;background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:8px;padding:7px 10px;font-size:10.5px;line-height:1.4;color:#cbd5e1;font-weight:600\" style-hover=\"border-color:#334155;color:#7dd3fc\">\n                <span style=\"color:{{ ge.col }};font-weight:800\">{{ ge.mark }}<\u002Fspan> {{ ge.title }} <span style=\"color:#475569;font-weight:400;font-family:'IBM Plex Mono',monospace\">· {{ ge.when }} · {{ ge.domain }}<\u002Fspan>\n              <\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ geoEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:0;font-size:10px;color:#64748b;padding:8px;border:1px dashed #334155;border-radius:8px;text-align:center\">Sin titulares geopolíticos relevantes en las últimas 16 h.<\u002Fp>\n          <\u002Fsc-if>\n          <p style=\"margin:8px 0 0;font-size:9px;color:#475569\">▼▼ shock severo · ▼ tensión · ▲ distensión. El score alimenta el bloque \"Geopolítica\" del modelo con sesgo asimétrico.<\u002Fp>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Agenda de catalizadores\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px;min-width:0\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px\">\n            <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Agenda de catalizadores<\u002Fh2>\n            <span style=\"font-size:9px;font-weight:700;color:{{ eventChipCol }};font-family:'IBM Plex Mono',monospace;text-align:right\">{{ eventChip }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ agendaRows }}\" as=\"ag\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:5.5px 0;border-bottom:1px solid #0f172a;opacity:{{ ag.op }};transition:opacity 0.2s\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:#7dd3fc;width:36px;flex-shrink:0\">{{ ag.date }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:11px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ ag.name }}<\u002Fdiv>\n                <div style=\"font-size:9px;color:#64748b\">{{ ag.cat }} · <span style=\"color:{{ ag.relCol }};font-weight:700\">{{ ag.rel }}<\u002Fspan> · <span style=\"color:{{ ag.whenCol }};font-weight:700\">{{ ag.when }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <button data-id=\"{{ ag.id }}\" sc-camel-on-click=\"{{ onPriced }}\" aria-pressed=\"{{ ag.pressed }}\" style=\"padding:3px 8px;border-radius:999px;border:1px solid {{ ag.pBord }};background:{{ ag.pBg }};color:{{ ag.pCol }};font-size:9px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap\" style-hover=\"border-color:#38bdf8\">{{ ag.pLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <p style=\"margin:8px 0 0;font-size:9px;color:#475569\">Agenda estimada — verifica fechas en tu broker. Eventos de alto impacto a ≤ 1 día activan la advertencia automática, penalizan la convicción y ensanchan σ. \"Priced in\" los excluye.<\u002Fp>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Backtest sintético\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 3px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Backtest de reglas · 250 sesiones sintéticas<\u002Fh2>\n          <p style=\"margin:0 0 9px;font-size:9.5px;color:#fbbf24;line-height:1.45\">⚠ Validación interna con datos sintéticos: NO es histórico real ni garantía de resultados.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px\">\n            <sc-for list=\"{{ btCells }}\" as=\"bt\" hint-placeholder-count=\"6\">\n              <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"{{ bt.tip }}\">\n                <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">{{ bt.label }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:{{ bt.col }}\">{{ bt.val }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px;position:relative;height:70px\">\n            <svg sc-camel-view-box=\"0 0 400 70\" sc-camel-preserve-aspect-ratio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%\">\n              <line x1=\"0\" x2=\"400\" y1=\"35\" y2=\"35\" stroke=\"#1e293b\" stroke-width=\"1\"><\u002Fline>\n              <polyline points=\"{{ btCurve }}\" fill=\"none\" stroke=\"#38bdf8\" stroke-width=\"1.6\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n            <\u002Fsvg>\n            <span style=\"position:absolute;top:2px;left:6px;font-size:8.5px;color:#475569;font-family:'IBM Plex Mono',monospace\">EQUITY (base 100)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Calibración histórica\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 3px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Calibración histórica · gap de apertura (2 años)<\u002Fh2>\n          <p style=\"margin:0 0 8px;font-size:9.5px;color:#64748b;line-height:1.5\">Regresión OLS día a día del gap de apertura del DAX contra el cierre US previo, los futuros ES overnight y las sesiones de Asia/Australia. <span style=\"color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ calibStatus }}<\u002Fspan><\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 62px 74px 40px;gap:6px;font-size:8.5px;font-weight:700;letter-spacing:0.05em;color:#475569;padding-bottom:4px;border-bottom:1px solid #1e293b\">\n            <span>MERCADO PREVIO AL DAX<\u002Fspan><span style=\"text-align:right\">β (pp/1 %)<\u002Fspan><span>PESO RELATIVO<\u002Fspan><span style=\"text-align:right\">%<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ calibRows }}\" as=\"cb\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:1fr 62px 74px 40px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #0f172a\" data-tip=\"{{ cb.tip }}\">\n              <span style=\"font-size:10.5px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ cb.name }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:{{ cb.col }}\">{{ cb.beta }}<\u002Fspan>\n              <div style=\"height:6px;border-radius:3px;background:#0b1224;overflow:hidden;align-self:center\">\n                <div style=\"height:100%;width:{{ cb.barW }}%;background:#38bdf8;border-radius:3px;transition:all 0.3s\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#94a3b8\">{{ cb.share }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;gap:8px;margin-top:10px;flex-wrap:wrap\">\n            <button sc-camel-on-click=\"{{ onCalibrate }}\" style=\"flex:1;min-width:160px;padding:7px;border-radius:8px;border:1px solid rgba(56,189,248,0.4);background:rgba(56,189,248,0.1);color:#7dd3fc;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"background:rgba(56,189,248,0.2)\">{{ calibBtnLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ calibHasData }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ onApplyCalib }}\" data-tip=\"Redistribuye el presupuesto de peso de los bloques EE. UU. cierre + Futuros US + Asia según los pesos relativos calibrados (|β|·σ normalizados). El resto de bloques no cambia y puedes restaurar los defaults cuando quieras.\" style=\"flex:1;min-width:160px;padding:7px;border-radius:8px;border:1px solid #334155;background:transparent;color:#cbd5e1;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"border-color:#38bdf8;color:#f8fafc\">Aplicar pesos a los bloques<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:9px;color:#475569\">El futuro FDAX de Eurex no tiene feed gratuito: ES/NQ overnight y la cadena Asia/Australia actúan como proxy, y esta regresión mide día a día (≈500 sesiones) cuánto anticipó cada mercado la apertura real del DAX — ahora también con técnicos del propio índice (momentum, rango previo, lunes). Con calibración activa, el gap implícito pre-apertura usa estas β. Se recalibra solo cada 7 días.<\u002Fp>\n          <div style=\"border-top:1px solid #0f172a;margin-top:10px;padding-top:9px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap\">\n              <div style=\"min-width:0\">\n                <div style=\"font-size:10.5px;font-weight:800;color:#e2e8f0\" data-tip=\"Regresión OLS del movimiento REAL 9:00–10:30 del DAX (60 días de intradía de 15 min) contra: gap de apertura, deriva del futuro ES overnight, S&amp;P post-17:30 y Nikkei del día. Su predicción entra en el ensemble de μ con peso 30 % y su σ residual (la volatilidad real de la ventana) se mezcla al 45 % con la σ derivada del VIX.\">Modelo directo 90 min · 60 días intradía<\u002Fdiv>\n                <div style=\"font-size:9px;color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ c90Status }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ onCalibrate90 }}\" style=\"padding:6px 12px;border-radius:8px;border:1px solid rgba(56,189,248,0.4);background:rgba(56,189,248,0.1);color:#7dd3fc;font-size:10.5px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"background:rgba(56,189,248,0.2)\">{{ c90BtnLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Precisión real\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 3px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Precisión real · registro señal → resultado<\u002Fh2>\n          <p style=\"margin:0 0 8px;font-size:9.5px;color:#64748b;line-height:1.5\">Cada mañana laborable se congela la señal a las 9:00 y a partir de las 10:35 se anota lo que hizo el DAX de verdad. <span style=\"color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ sigStatus }}<\u002Fspan><\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:7px;margin-bottom:9px\">\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"Señales con resultado ya cerrado (además hay {{ sigPendN }} pendientes). Con 25+ puedes aplicar la calibración de probabilidad.\">\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">SEÑALES<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#e2e8f0\">{{ sigN }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"Porcentaje de señales cuya dirección prevista coincidió con el movimiento real 9:00→10:30.\">\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">ACIERTO<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#e2e8f0\">{{ hitStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"Acierto solo en señales operables (p ≥ umbral): es el número que importa. Objetivo sostenido: 55–58 %+.\">\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">ACIERTO P≥UMBRAL<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#34d399\">{{ hiHitStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"Brier score = media de (probabilidad − resultado)². Mide la calidad de las probabilidades: 0,25 = tirar una moneda; cuanto más bajo, mejor calibrado.\">\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">BRIER<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#e2e8f0\">{{ brierStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:7px 10px\" data-tip=\"Ajuste de la pendiente logística aplicado a la probabilidad del modelo, derivado de tu registro real (acierto observado vs. probabilidad prometida).\">\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">CALIBRACIÓN<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#7dd3fc\">{{ calAdjStr }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 34px 62px 62px;gap:5px;font-size:8.5px;font-weight:700;letter-spacing:0.05em;color:#475569;padding-bottom:3px;border-bottom:1px solid #1e293b\">\n            <span>TRAMO<\u002Fspan><span style=\"text-align:right\">N<\u002Fspan><span style=\"text-align:right\">PROMETIDO<\u002Fspan><span style=\"text-align:right\">REAL<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ sigBuckets }}\" as=\"sb\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid;grid-template-columns:1fr 34px 62px 62px;gap:5px;padding:4px 0;border-bottom:1px solid #0f172a;font-family:'IBM Plex Mono',monospace;font-size:10px\" data-tip=\"Curva de calibración: si el modelo promete {{ sb.pred }} de media en este tramo, el acierto real debería parecerse. Diferencias grandes = probabilidad mal calibrada.\">\n              <span style=\"color:#cbd5e1;font-family:'Archivo',sans-serif;font-size:10.5px\">{{ sb.label }}<\u002Fspan>\n              <span style=\"text-align:right;color:#94a3b8\">{{ sb.n }}<\u002Fspan>\n              <span style=\"text-align:right;color:{{ sb.col }}\">{{ sb.pred }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ sb.col }}\">{{ sb.real }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <a href=\"#acc-historico\" style=\"display:block;margin-top:8px;font-size:10px;color:#7dd3fc;padding:7px 9px;border:1px dashed #1e293b;border-radius:8px;text-align:center\">Registro completo día a día — puntos previstos vs. reales, error y CSV — en «Histórico de predicciones», más abajo ↓<\u002Fa>\n          <sc-if value=\"{{ sigEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"margin:6px 0 0;font-size:10px;color:#64748b;padding:8px;border:1px dashed #334155;border-radius:8px;text-align:center\">Sin señales registradas aún. Deja la pestaña abierta entre 8:25 y 10:35 los días laborables y el registro se llena solo.<\u002Fp>\n          <\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ onApplyCal }}\" data-tip=\"Con 25+ señales cerradas, ajusta la pendiente de la probabilidad para que lo prometido case con lo observado (factor acotado ×0,6–×1,4). Es la mejora de precisión más honesta: usa TUS datos.\" style=\"margin-top:9px;width:100%;padding:7px;border-radius:8px;border:1px solid #334155;background:transparent;color:#cbd5e1;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s\" style-hover=\"border-color:#38bdf8;color:#f8fafc\">Aplicar calibración de probabilidad (mín. 25 señales)<\u002Fbutton>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ HISTÓRICO PREDICCIÓN VS REAL ============ -->\n    <section id=\"acc-historico\" data-screen-label=\"Histórico de predicciones\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:11px\">\n        <div style=\"min-width:260px;flex:1\">\n          <h2 style=\"margin:0;font-size:13px;font-weight:800;color:#f8fafc\">Histórico de predicciones · predicho vs. real (9:00→10:30)<\u002Fh2>\n          <p style=\"margin:3px 0 0;font-size:10.5px;color:#64748b;line-height:1.55;max-width:820px\">Una línea por sesión: la señal congelada a las 9:00 (dirección, probabilidad, μ y puntos previstos) y al lado el movimiento real del DAX en la primera hora y media. <span style=\"color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ sigStatus }}<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n          <button sc-camel-on-click=\"{{ onFreezeNow }}\" data-tip=\"Congela la señal actual como predicción de hoy sin esperar a la captura automática de 8:25–9:00. Solo tiene sentido ANTES de las 9:00 CET; la automática la refresca si llega después.\" style=\"padding:7px 12px;border-radius:8px;border:1px solid #334155;background:transparent;color:#cbd5e1;font-size:10.5px;font-weight:700;cursor:pointer;opacity:{{ freezeDim }};transition:all 0.2s\" style-hover=\"border-color:#38bdf8;color:#f8fafc\">{{ freezeLabel }}<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onBackfill }}\" data-tip=\"Descarga 60 días de intradía (15 min) del DAX y cierra el resultado real de todas las señales pendientes — útil si la pestaña no estuvo abierta a las 10:35.\" style=\"padding:7px 12px;border-radius:8px;border:1px solid #334155;background:transparent;color:#cbd5e1;font-size:10.5px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"border-color:#38bdf8;color:#f8fafc\">{{ bfLabel }}<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onExportCsv }}\" data-tip=\"Exporta el registro completo a CSV con separador «;» y decimales con coma: se abre directo en Excel en español.\" style=\"padding:7px 12px;border-radius:8px;border:1px solid rgba(56,189,248,0.4);background:rgba(56,189,248,0.08);color:#7dd3fc;font-size:10.5px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"background:rgba(56,189,248,0.18)\">⬇ Exportar CSV<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px;margin-bottom:12px\">\n        <sc-for list=\"{{ accKpis }}\" as=\"ak\" hint-placeholder-count=\"7\">\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"{{ ak.tip }}\">\n            <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.06em\">{{ ak.label }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:{{ ak.col }}\">{{ ak.val }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"overflow-x:auto\">\n        <div style=\"min-width:880px\">\n          <div style=\"display:grid;grid-template-columns:96px 62px 50px 76px 72px 84px 72px 58px minmax(150px,1fr) 24px;gap:8px;font-size:8.5px;font-weight:700;letter-spacing:0.05em;color:#475569;padding:0 4px 5px;border-bottom:1px solid #1e293b\">\n            <span>FECHA<\u002Fspan><span>SEÑAL<\u002Fspan><span style=\"text-align:right\">PROB.<\u002Fspan><span style=\"text-align:right\" data-tip=\"Movimiento 9:00→10:30 previsto por el ensemble en el momento de congelar la señal.\">μ PREVISTO<\u002Fspan><span style=\"text-align:right\" data-tip=\"μ previsto convertido a puntos del índice sobre el nivel de referencia de las 9:00.\">PTS PREV.<\u002Fspan><span style=\"text-align:right\" data-tip=\"Movimiento real del DAX entre las 9:00 y las 10:30, con intradía de 15 min.\">REAL 90 MIN<\u002Fspan><span style=\"text-align:right\">PTS REAL<\u002Fspan><span style=\"text-align:right\" data-tip=\"Error absoluto |previsto − real| en puntos porcentuales.\">ERROR<\u002Fspan><span data-tip=\"Barra superior azul: μ previsto. Barra inferior verde/roja: movimiento real. Escala común centrada en cero.\">PREVISTO VS REAL<\u002Fspan><span><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"max-height:390px;overflow-y:auto\">\n            <sc-for list=\"{{ accRows }}\" as=\"ar\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid;grid-template-columns:96px 62px 50px 76px 72px 84px 72px 58px minmax(150px,1fr) 24px;gap:8px;align-items:center;padding:5px 4px;border-bottom:1px solid #0b1224;font-family:'IBM Plex Mono',monospace;font-size:10.5px\">\n                <span style=\"color:#cbd5e1\">{{ ar.date }}<\u002Fspan>\n                <span style=\"color:{{ ar.dirCol }};font-weight:800;font-size:10px\">{{ ar.dir }}<\u002Fspan>\n                <span style=\"text-align:right;color:#94a3b8\">{{ ar.p }}<\u002Fspan>\n                <span style=\"text-align:right;color:#7dd3fc\">{{ ar.mu }}<\u002Fspan>\n                <span style=\"text-align:right;color:#64748b\">{{ ar.predPts }}<\u002Fspan>\n                <span style=\"text-align:right;font-weight:700;color:{{ ar.outCol }}\">{{ ar.out }}<\u002Fspan>\n                <span style=\"text-align:right;color:#64748b\">{{ ar.outPts }}<\u002Fspan>\n                <span style=\"text-align:right;color:{{ ar.errCol }}\">{{ ar.err }}<\u002Fspan>\n                <span style=\"position:relative;display:block;height:16px;background:rgba(2,6,23,0.55);border-radius:4px;overflow:hidden\">\n                  <span style=\"position:absolute;left:50%;top:0;bottom:0;width:1px;background:#1e293b\"><\u002Fspan>\n                  <span style=\"position:absolute;top:2.5px;height:4px;border-radius:2px;background:#38bdf8;opacity:0.8;left:{{ ar.pL }}%;width:{{ ar.pW }}%\"><\u002Fspan>\n                  <span style=\"position:absolute;bottom:2.5px;height:4px;border-radius:2px;background:{{ ar.oCol }};left:{{ ar.oL }}%;width:{{ ar.oW }}%\"><\u002Fspan>\n                <\u002Fspan>\n                <span style=\"text-align:center;font-weight:800;color:{{ ar.markCol }}\">{{ ar.mark }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ accEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"margin:10px 0 0;font-size:10.5px;color:#64748b;padding:12px;border:1px dashed #334155;border-radius:8px;text-align:center;line-height:1.6\">Sin predicciones registradas todavía. La señal de hoy se congela sola entre 8:25 y 9:00 con la pestaña abierta (o pulsa «Congelar señal de hoy» antes de las 9:00); el resultado real se anota a partir de las 10:35 o con «Cerrar pendientes».<\u002Fp>\n      <\u002Fsc-if>\n      <p style=\"margin:9px 0 0;font-size:9.5px;color:#475569;line-height:1.5\">Acierto ✓ = signo previsto correcto · Error en puntos porcentuales (la volatilidad típica de la ventana ronda 0,45 pp) · Los puntos usan el nivel real de las 9:00 cuando existe; en señales pendientes, el nivel de referencia al congelarlas · El registro vive en este navegador (máx. 120 sesiones) — exporta a CSV para archivarlo.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ============ FACTOR LIBRARY ============ -->\n    <section data-screen-label=\"Biblioteca de factores\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:4px\">\n        <h2 style=\"margin:0;font-size:13px;font-weight:800;color:#f8fafc\">Biblioteca de factores · {{ libCount }} indicadores medidos<\u002Fh2>\n        <span style=\"font-size:9.5px;color:#64748b;font-family:'IBM Plex Mono',monospace\">{{ libRowsN }} aquí + 40 rastreadores de noticias + 70 métricas de profundidad del Top 10<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 12px;font-size:10.5px;color:#64748b\">Cada indicador con su valor en vivo, señal normalizada (−100…+100), peso efectivo dentro del modelo y contribución del bloque a μ. Peso efectivo = peso del bloque × peso interno del indicador.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:12px\">\n        <sc-for list=\"{{ libGroups }}\" as=\"lg\" hint-placeholder-count=\"6\">\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:11px;padding:11px 13px;min-width:0\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px\">\n              <span style=\"font-size:11px;font-weight:800;color:#e2e8f0\">{{ lg.title }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#94a3b8\">peso {{ lg.wPct }} % · <span style=\"color:{{ lg.contribCol }};font-weight:700\">{{ lg.contrib }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.5fr 66px 62px 96px 48px 38px;gap:5px;font-size:8px;font-weight:700;letter-spacing:0.05em;color:#475569;padding-bottom:3px;border-bottom:1px solid #16213a\">\n              <span>INDICADOR<\u002Fspan><span style=\"text-align:right\">VALOR<\u002Fspan><span style=\"text-align:right\">CAMBIO<\u002Fspan><span style=\"text-align:center\">SEÑAL ±100<\u002Fspan><span style=\"text-align:right\">PESO EF.<\u002Fspan><span style=\"text-align:right\">EST.<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ lg.rows }}\" as=\"li\" hint-placeholder-count=\"4\">\n              <div style=\"display:grid;grid-template-columns:1.5fr 66px 62px 96px 48px 38px;gap:5px;align-items:center;padding:3.5px 0;border-bottom:1px solid #0b1224\" data-tip=\"{{ li.tip }}\">\n                <span style=\"font-size:10px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ li.label }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#e2e8f0\">{{ li.val }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:{{ li.chgCol }}\">{{ li.chg }}<\u002Fspan>\n                <div style=\"height:5px;border-radius:2px;background:#0b1224;position:relative;overflow:hidden;align-self:center\">\n                  <div style=\"position:absolute;left:50%;top:0;bottom:0;width:1px;background:#334155\"><\u002Fdiv>\n                  <div style=\"position:absolute;top:0;bottom:0;left:{{ li.sigLeft }}%;width:{{ li.sigW }}%;background:{{ li.sigCol }};border-radius:2px;transition:all 0.3s\"><\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#94a3b8\">{{ li.swStr }}<\u002Fspan>\n                <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;color:{{ li.stCol }}\">{{ li.state }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ METHODOLOGY ============ -->\n    <section data-screen-label=\"Metodología y aviso\" style=\"background:rgba(15,23,42,0.5);border:1px solid #1e293b;border-radius:14px;padding:15px 18px\">\n      <div style=\"display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start\">\n        <div style=\"flex:1.2;min-width:280px\">\n          <h2 style=\"margin:0 0 6px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Metodología · Opening Range Model v4<\u002Fh2>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7dd3fc;background:rgba(2,6,23,0.6);border:1px solid #0f172a;border-radius:8px;padding:8px 12px;display:inline-block\">μ = 0,55·bloques(19) + 0,15·bottom-up(40) + 0,30·regresión90min · p = logit(1,15·cal·μ/σ) con cal ajustado por el registro real · σ = mezcla VIX/realizada + σ90 histórica · prev. empresaᵢ = βᵢ·μ + tiltᵢ · operar si p ≥ umbral y EV &gt; 0<\u002Fdiv>\n          <p style=\"margin:8px 0 0;font-size:10.5px;color:#64748b;line-height:1.6\">v4 mantiene la descomposición de la sesión americana (día completo, tramo 17:30–22:00 CET no descontado y última hora institucional), Asia con momentum del Nikkei, curva US completa (3M–30A) y riesgo (VIX/VXN/VVIX, oro, JPY, cripto). Novedades: bloque \"Las 40\" bottom-up — para cada empresa se calculan drivers US (β a sectores/megacaps), sensibilidad de perfil (tipos, energía, China, FX), noticias propias ponderadas por peso índice × severidad × recencia (léxico EN/DE) y momentum de 2ª mitad; su agregado Σw alimenta μ y genera la previsión por empresa a 1,5 h y a día siguiente (βᵢ·μ + tilt idiosincrático, coherente por construcción: el check bottom-up Σw·prev se muestra junto a las tarjetas). La probabilidad del panel es la P(dirección); la P(objetivo antes que stop) usa la fórmula de barrera con deriva. Todas las probabilidades están acotadas: ningún setup ofrece certeza.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:260px\">\n          <h2 style=\"margin:0 0 6px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#fbbf24;font-weight:700\">⚠ Límites y aviso<\u002Fh2>\n          <p style=\"margin:0;font-size:10.5px;color:#94a3b8;line-height:1.6\">Yahoo vía proxies CORS públicos (~15 min retardo, disponibilidad no garantizada), BCE (FX diario), GDELT (~15 min). Sin feed tick-a-tick ni libro L2 gratuitos. Los pesos son estimaciones editables basadas en evidencia publicada, no constantes verificadas; la \"precisión\" de cualquier probabilidad de apertura es limitada por naturaleza. Esta herramienta organiza la decisión y también dice cuándo NO operar. CFD = alto riesgo. No es asesoramiento financiero.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer style=\"text-align:center;font-size:10px;color:#334155;font-family:'IBM Plex Mono',monospace;padding-bottom:6px\">DAX OPENING TRADER LIVE V5 · ENSEMBLE 3 MODELOS · 19 BLOQUES · 121 SÍMBOLOS · REGISTRO SEÑAL→RESULTADO · YAHOO + BCE + GDELT VÍA PROXIES GRATUITOS · NO ES ASESORAMIENTO FINANCIERO<\u002Ffooter>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;1600px&quot;, &quot;height&quot;: &quot;1000px&quot; },\n  &quot;umbralProbabilidad&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 58, &quot;min&quot;: 52, &quot;max&quot;: 70, &quot;unit&quot;: &quot;%&quot;, &quot;section&quot;: &quot;Reglas&quot; },\n  &quot;objetivoMaxPct&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.5, &quot;max&quot;: 1.5, &quot;step&quot;: 0.1, &quot;unit&quot;: &quot;%&quot;, &quot;section&quot;: &quot;Reglas&quot; },\n  &quot;spreadPts&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 2, &quot;min&quot;: 0.5, &quot;max&quot;: 10, &quot;unit&quot;: &quot;pts&quot;, &quot;section&quot;: &quot;Reglas&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const P = props || {};\n    this.THRESH = this.cl(parseFloat(P.umbralProbabilidad) || 58, 52, 70);\n    this.TGTMAX = this.cl(parseFloat(P.objetivoMaxPct) || 1.0, 0.5, 1.5);\n    this.SPREAD = this.cl(parseFloat(P.spreadPts) || 2, 0.5, 10);\n    this.LSKEY = 'dax-ot-live-v3';\n    this.CACHEKEY = 'dax-ot-live-cache-v3';\n    this.CALIBKEY = 'dax-ot-calib-v2';\n    this.CAL90K
