document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

el }}\n                      <input type=\"{{ ff.type }}\" data-sk=\"{{ ff.k }}\" value=\"{{ ff.val }}\" sc-camel-on-change=\"{{ onKeyInput }}\" placeholder=\"{{ ff.ph }}\" autocomplete=\"off\" spellcheck=\"false\" style=\"padding:7px 10px;border-radius:7px;border:1px solid #334155;background:#0b1224;color:#f8fafc;font-size:11.5px;font-family:'IBM Plex Mono',monospace;width:100%\">\n                    <\u002Flabel>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\">\n                  <button data-src=\"{{ cc.id }}\" sc-camel-on-click=\"{{ onTestKey }}\" style=\"padding:7px 13px;border-radius:8px;border:1px solid rgba(56,189,248,0.4);background:rgba(56,189,248,0.1);color:#7dd3fc;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"background:rgba(56,189,248,0.2)\">Probar conexión<\u002Fbutton>\n                  <span style=\"font-size:9.5px;font-weight:800;color:{{ cc.stCol }};font-family:'IBM Plex Mono',monospace\">{{ cc.stS }}<\u002Fspan>\n                <\u002Fdiv>\n                <sc-if value=\"{{ cc.stMsg }}\" hint-placeholder-val=\"{{ false }}\">\n                  <p style=\"margin:0;font-size:9.5px;color:#94a3b8;line-height:1.5\">{{ cc.stMsg }}<\u002Fp>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <section style=\"background:rgba(15,23,42,0.5);border:1px solid #1e293b;border-radius:14px;padding:15px 18px\">\n        <h2 style=\"margin:0 0 8px;font-size:12px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#34d399\">Ya activas sin necesidad de key<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;font-size:10.5px;color:#94a3b8;line-height:1.55\">\n          <div><span style=\"color:#6ee7b7;font-weight:700\">✓ Yahoo Finance<\u002Fspan> · 117 símbolos intradía (~15 min) + OHLC diario + histórico 2 años para la calibración.<\u002Fdiv>\n          <div><span style=\"color:#6ee7b7;font-weight:700\">✓ GDELT<\u002Fspan> · noticias macro, geopolíticas y de las 40 con severidad × peso × recencia.<\u002Fdiv>\n          <div><span style=\"color:#6ee7b7;font-weight:700\">✓ BCE / Frankfurter<\u002Fspan> · referencia oficial EUR/USD.<\u002Fdiv>\n          <div><span style=\"color:#6ee7b7;font-weight:700\">✓ Calibración 2A<\u002Fspan> · regresión OLS día a día del gap contra US/futuros/Asia (β aplicadas al gap implícito).<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:10px 0 0;font-size:9.5px;color:#475569\">Cuando tengas una conexión Tier 1 operativa (IG o IBKR), pídeme el cableado final: sustituir el gap implícito por el precio real del futuro, cotizaciones sin retardo en la ventana 9:00–10:30 y recalibración contra FDAX real.<\u002Fp>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showDash }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1800px;margin:0 auto;padding:14px 18px 30px;display:grid;gap:14px\">\n\n    <!-- ============ HERO ============ -->\n    <div data-screen-label=\"Señal de apertura\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px\">\n\n      <section style=\"background:{{ sigCardBg }};border:1px solid {{ sigCardBord }};border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:all 0.3s\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n          <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#94a3b8;font-weight:700\">Señal primera 1,5 h<\u002Fh2>\n          <span style=\"font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(2,6,23,0.5);color:#94a3b8;font-family:'IBM Plex Mono',monospace\">VÁLIDA 9:00–10:30 CET<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n          <span style=\"font-size:36px;font-weight:800;color:{{ sigCol }};line-height:1\">{{ sigArrow }} {{ sigLabel }}<\u002Fspan>\n          <div data-tip=\"Probabilidad de que el DAX se mueva en la dirección prevista en 9:00–10:30. p = logit(1,15 · z) con z = μ/σ90, acotada 15–85 %: ningún setup ofrece certeza.\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:{{ sigCol }};line-height:1.1\">{{ sigProb }} %<\u002Fdiv>\n            <div style=\"font-size:10.5px;color:#94a3b8\">prob. de la dirección prevista<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px\">\n          <span style=\"color:#94a3b8\" data-tip=\"Movimiento esperado del DAX para 9:00–10:30. μ = Σ peso_bloque × señal × k(3,2) sobre los 19 bloques, acotado ±1,5 %. El desglose completo está en Contribución al movimiento esperado.\">μ esperado <span style=\"color:{{ sigCol }};font-weight:700\">{{ sigMu }}<\u002Fspan><\u002Fspan>\n          <span style=\"color:#94a3b8\" data-tip=\"Convicción objetiva 0–100 = 35 % probabilidad direccional + 25 % consenso de factores + 20 % calidad/frescura de datos + 10 % fuerza |z| + 10 % ausencia de avisos. ALTA ≥ 70, MEDIA ≥ 45.\">Convicción <span style=\"color:{{ sigConvCol }};font-weight:700\">{{ sigConv }} · {{ convScore }}/100<\u002Fspan><\u002Fspan>\n          <span style=\"color:#94a3b8\" data-tip=\"Probabilidad de que el DAX cierre las 10:30 por encima del cierre previo: 1 − Φ(0; μ, σ) con la normal del modelo.\">P(cierre &gt; 0) <span style=\"color:#e2e8f0;font-weight:700\">{{ pAbove0 }} %<\u002Fspan><\u002Fspan>\n          <span style=\"color:#94a3b8\" data-tip=\"Probabilidad de tocar el precio objetivo antes que el stop, con fórmula de barrera para un proceso con deriva μ y volatilidad σ. Es la p que se usa en el EV del plan.\">P(objetivo antes que stop) <span style=\"color:#e2e8f0;font-weight:700\">{{ pHit }} %<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:7px 11px;border-radius:9px;background:rgba(2,6,23,0.55);border:1px solid {{ execBord }};font-size:11px;font-weight:800;color:{{ execCol }};font-family:'IBM Plex Mono',monospace\">{{ execLabel }}<\u002Fdiv>\n        <p style=\"margin:0;font-size:12px;line-height:1.5;color:#cbd5e1\">{{ sigReason }}<\u002Fp>\n        <p style=\"margin:0;font-size:10.5px;color:{{ sigPhaseNoteCol }}\">{{ sigPhaseNote }}<\u002Fp>\n        <div style=\"border-top:1px solid rgba(148,163,184,0.15);padding-top:9px;display:grid;gap:4px\">\n          <sc-for list=\"{{ gates }}\" as=\"g\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:10.5px\" data-tip=\"{{ g.tip }}\">\n              <span style=\"width:14px;height:14px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;background:{{ g.bg }};color:{{ g.col }};flex-shrink:0\">{{ g.mark }}<\u002Fspan>\n              <span style=\"color:#94a3b8;flex:1\">{{ g.label }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:{{ g.col }}\">{{ g.note }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section data-screen-label=\"Plan de trade\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:16px;padding:18px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px\">\n          <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Plan de trade · CFD<\u002Fh2>\n          <span style=\"font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:{{ entryTagBg }};color:{{ entryTagCol }};font-family:'IBM Plex Mono',monospace\">{{ entryTag }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px\">\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Nivel de referencia para entrar: el precio en vivo del DAX si Xetra está abierto (~15 min de retardo) o la apertura implícita (cierre previo × (1 + gap implícito)) antes de las 9:00. Confirma siempre con el precio de tu broker.\">\n            <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">REFERENCIA DE ENTRADA<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:#f8fafc\">{{ planEntry }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Objetivo = entrada × (1 + dirección × min(1,6·|μ|; máximo configurado)), acotado 0,5–1,5 %. Escala con la señal: señales fuertes justifican objetivos más ambiciosos.\">\n            <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">OBJETIVO<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:#34d399\">{{ planTarget }}<\u002Fdiv>\n            <div style=\"font-size:9.5px;color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ planTargetPts }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Stop = 60 % de la distancia del objetivo, en contra. Fija el ratio R/R en ~1,67× y limita la pérdida si la señal falla. Salida por tiempo a las 10:30 aunque no toque ninguno.\">\n            <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">STOP<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:#f43f5e\">{{ planStop }}<\u002Fdiv>\n            <div style=\"font-size:9.5px;color:#94a3b8;font-family:'IBM Plex Mono',monospace\">{{ planStopPts }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"R/R = puntos de objetivo / puntos de stop. EV = P(objetivo antes que stop) × objetivo − (1 − P) × stop − spread, en puntos. Solo se opera con EV &gt; 0: ventaja esperada tras fricciones.\">\n            <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">RATIO R/R · EV NETO<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:{{ planEvCol }}\">{{ planRR }} · {{ planEv }}<\u002Fdiv>\n            <div style=\"font-size:9.5px;color:#94a3b8\">incluye spread {{ spreadStr }} pts<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap\">\n          <label for=\"otl-cap\" style=\"font-size:10.5px;color:#94a3b8\">Capital €<\u002Flabel>\n          <input id=\"otl-cap\" type=\"text\" inputmode=\"decimal\" value=\"{{ capital }}\" sc-camel-on-change=\"{{ onCapital }}\" style=\"width:86px;padding:5px 8px;border-radius:7px;border:1px solid #334155;background:#0b1224;color:#f8fafc;font-size:12px\">\n          <label for=\"otl-risk\" style=\"font-size:10.5px;color:#94a3b8\">Riesgo %<\u002Flabel>\n          <input id=\"otl-risk\" type=\"text\" inputmode=\"decimal\" value=\"{{ riskPct }}\" sc-camel-on-change=\"{{ onRisk }}\" style=\"width:52px;padding:5px 8px;border-radius:7px;border:1px solid #334155;background:#0b1224;color:#f8fafc;font-size:12px\">\n          <span style=\"font-size:11px;color:#e2e8f0;font-family:'IBM Plex Mono',monospace;font-weight:700\">→ {{ planSize }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:9px 0 0;font-size:10px;color:#64748b\">Salida por tiempo 10:30 CET. Riesgo máx.: {{ planRiskEur }}. Yahoo ~15 min de retardo: ejecuta con el precio de tu broker.<\u002Fp>\n      <\u002Fsection>\n\n      <section data-screen-label=\"Apertura y distribución\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:16px;padding:18px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px\">\n          <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Apertura · Gap<\u002Fh2>\n          <span style=\"font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:{{ gapTagBg }};color:{{ gapTagCol }};font-family:'IBM Plex Mono',monospace\">{{ gapTag }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap\" data-tip=\"Antes de las 9:00: gap implícito = 0,50·deriva futuros ES + 0,28·S&amp;P post-17:30 + 0,15·composite Asia (acotado ±3 %). Desde las 9:00: gap real = apertura Xetra vs. cierre previo. Alimenta el bloque Dinámica del gap: momentum si es pequeño, reversión desde ±0,8 %.\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;color:{{ gapCol }}\">{{ gapStr }}<\u002Fspan>\n          <span style=\"font-size:11px;color:#94a3b8\">{{ gapPts }} pts vs. cierre {{ prevCloseStr }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:6px 0 10px;font-size:10.5px;line-height:1.5;color:#cbd5e1\">{{ gapNote }}<\u002Fp>\n        <h3 style=\"margin:0 0 6px;font-size:9.5px;letter-spacing:0.1em;color:#64748b;font-weight:800\">DISTRIBUCIÓN DEL CIERRE A LAS 10:30 · N(μ, σ)<\u002Fh3>\n        <div style=\"display:grid;gap:4px\">\n          <sc-for list=\"{{ distRows }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:8px\" data-tip=\"{{ d.tip }}\">\n              <span style=\"width:86px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#94a3b8;white-space:nowrap\">{{ d.label }}<\u002Fspan>\n              <div style=\"flex:1;height:9px;border-radius:3px;background:#0b1224;overflow:hidden\">\n                <div style=\"height:100%;width:{{ d.w }}%;background:{{ d.col }};border-radius:3px;transition:all 0.3s\"><\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width:44px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:{{ d.col }}\">{{ d.p }} %<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;border-top:1px solid #0f172a;padding-top:9px\">\n          <sc-for list=\"{{ scenarios }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"text-align:center\" data-tip=\"{{ s.tip }}\">\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800;color:{{ s.col }}\">{{ s.p }} %<\u002Fdiv>\n              <div style=\"font-size:8.5px;color:#64748b;font-weight:700;letter-spacing:0.04em\">{{ s.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ============ SESSION CHAIN ============ -->\n    <section data-screen-label=\"Cadena de sesiones\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px\">\n        <h2 style=\"margin:0;font-size:13px;font-weight:800;color:#f8fafc\">Cadena de sesiones · qué hereda el DAX esta mañana<\u002Fh2>\n        <span style=\"font-size:9.5px;color:#64748b;font-family:'IBM Plex Mono',monospace\">Wall Street 15:30–22:00 → futuros overnight → Asia 1:00–8:00 → Xetra 9:00<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px\">\n        <sc-for list=\"{{ chainPanels }}\" as=\"ch\" hint-placeholder-count=\"3\">\n          <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:11px;padding:11px 13px;min-width:0\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px\">\n              <span style=\"font-size:11px;font-weight:800;color:{{ ch.col }}\">{{ ch.title }}<\u002Fspan>\n              <span style=\"font-size:9px;color:#475569;font-family:'IBM Plex Mono',monospace\">{{ ch.range }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative;height:64px;margin-bottom:7px\">\n              <svg sc-camel-view-box=\"0 0 300 64\" sc-camel-preserve-aspect-ratio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%\">\n                <line x1=\"0\" x2=\"300\" y1=\"{{ ch.refY }}\" y2=\"{{ ch.refY }}\" stroke=\"#334155\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Fline>\n                <polyline points=\"{{ ch.spark }}\" fill=\"none\" stroke=\"{{ ch.col }}\" stroke-width=\"1.6\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:5px\">\n              <sc-for list=\"{{ ch.metrics }}\" as=\"mt\" hint-placeholder-count=\"3\">\n                <div style=\"background:rgba(15,23,42,0.7);border:1px solid #16213a;border-radius:7px;padding:5px 7px;min-width:0\" data-tip=\"{{ mt.tip }}\">\n                  <div style=\"font-size:7.5px;color:#64748b;font-weight:700;letter-spacing:0.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ mt.label }}<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:{{ mt.col }}\">{{ mt.val }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:6px 0 0;font-size:9.5px;color:#64748b;line-height:1.45\">{{ ch.note }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ MAIN GRID ============ -->\n    <div id=\"otl-grid\">\n\n      <!-- LEFT -->\n      <div id=\"otl-col-left\">\n        <section data-screen-label=\"Fuentes en vivo\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 4px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Fuentes en vivo · gratuitas<\u002Fh2>\n          <p style=\"margin:0 0 8px;font-size:9.5px;color:#64748b;line-height:1.5\">121 símbolos vía Yahoo (incl. futuros vivos overnight: ZN/ZF, DXY, NIY), FX BCE, noticias GDELT. Auto-actualización cada 3 min.<\u002Fp>\n          <sc-for list=\"{{ srcRows }}\" as=\"sr\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #0f172a\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ sr.col }};flex-shrink:0\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:11.5px;font-weight:600;color:#e2e8f0\">{{ sr.name }}<\u002Fdiv>\n                <div style=\"font-size:9px;color:#64748b\">{{ sr.detail }}<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:{{ sr.col }};white-space:nowrap\">{{ sr.state }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <p style=\"margin:8px 0 0;font-size:9px;color:#475569\">Proxies en cascada: allorigins → corsproxy → codetabs. Última sincronización: {{ lastSyncStr }}.<\u002Fp>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Mercados en vivo\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 8px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Mercados · en vivo<\u002Fh2>\n          <sc-for list=\"{{ marketGroups }}\" as=\"mg\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:7px\">\n              <h3 style=\"margin:0 0 3px;font-size:9px;letter-spacing:0.1em;color:{{ mg.col }};font-weight:800\">{{ mg.title }}<\u002Fh3>\n              <sc-for list=\"{{ mg.rows }}\" as=\"mr\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #0f172a\">\n                  <span style=\"font-size:11px;font-weight:600;color:#e2e8f0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ mr.name }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#94a3b8\">{{ mr.val }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;color:{{ mr.col }};width:62px;text-align:right\">{{ mr.chg }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Condiciones especiales\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <h2 style=\"margin:0 0 9px;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Condiciones especiales de hoy<\u002Fh2>\n          <div style=\"display:grid;gap:6px\">\n            <sc-for list=\"{{ flagBtns }}\" as=\"fl\" hint-placeholder-count=\"3\">\n              <button data-k=\"{{ fl.k }}\" sc-camel-on-click=\"{{ onFlag }}\" aria-pressed=\"{{ fl.pressed }}\" style=\"display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;border:1px solid {{ fl.bord }};background:{{ fl.bg }};color:{{ fl.col }};font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:left\" style-hover=\"border-color:#f59e0b\">\n                <span style=\"width:14px;height:14px;border-radius:4px;border:1px solid {{ fl.boxBord }};background:{{ fl.boxBg }};display:flex;align-items:center;justify-content:center;font-size:9px;color:#020617;font-weight:800;flex-shrink:0\">{{ fl.mark }}<\u002Fspan>\n                <span style=\"flex:1\">{{ fl.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Pesos del modelo\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:15px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px\">\n            <h2 style=\"margin:0;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;font-weight:700\">Pesos · 19 bloques<\u002Fh2>\n            <span style=\"font-size:10.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#94a3b8\">Σ {{ wTotal }} %<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 4px;font-size:9.5px;color:#64748b\">Defaults según evidencia de spillover. Se normalizan a 100 %.<\u002Fp>\n          <sc-for list=\"{{ weightRows }}\" as=\"w\" hint-placeholder-count=\"8\">\n            <div style=\"padding:6px 0;border-bottom:1px solid #0f172a\" data-tip=\"Peso del bloque {{ w.label }}: {{ w.pctStr }} del modelo tras normalizar la suma a 100 %. {{ w.evidence }} Ajústalo con el slider; Restaurar vuelve a los valores de evidencia.\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:11.5px;font-weight:700;color:#e2e8f0;flex:1\">{{ w.label }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:700;color:#f8fafc\">{{ w.pctStr }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"100\" step=\"1\" value=\"{{ w.raw }}\" data-k=\"{{ w.k }}\" sc-camel-on-change=\"{{ onWeightO }}\" aria-label=\"Peso {{ w.label }}\">\n              <div style=\"font-size:9px;color:#64748b;line-height:1.4\">{{ w.evidence }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button sc-camel-on-click=\"{{ onWeightsDefault }}\" style=\"margin-top:10px;width:100%;padding:7px;border-radius:8px;border:1px solid #334155;background:transparent;color:#cbd5e1;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s\" style-hover=\"border-color:#38bdf8;color:#f8fafc\">Restaurar pesos de evidencia<\u002Fbutton>\n        <\u002Fsection>\n      <\u002Fdiv>\n\n      <!-- CENTER -->\n      <div id=\"otl-col-mid\">\n        <section data-screen-label=\"Contribución de factores\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px;min-width:0\">\n          <h2 style=\"margin:0 0 3px;font-size:13px;font-weight:800;color:#f8fafc\">Contribución al movimiento esperado · 19 bloques<\u002Fh2>\n          <p style=\"margin:0 0 12px;font-size:10.5px;color:#64748b\">Todos calculados automáticamente de las fuentes en vivo · μ para 9:00–10:30<\u002Fp>\n          <sc-for list=\"{{ factorRows }}\" as=\"fr\" hint-placeholder-count=\"8\">\n            <div style=\"padding:7px 0;border-bottom:1px solid #0f172a\" data-tip=\"{{ fr.tip }}\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:11.5px;font-weight:700;color:#e2e8f0;flex:1;min-width:0\">{{ fr.label }}<\u002Fspan>\n                <span style=\"font-size:9.5px;color:#64748b;font-family:'IBM Plex Mono',monospace\">{{ fr.rawStr }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:{{ fr.col }};width:70px;text-align:right\">{{ fr.contrib }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:6px;border-radius:3px;background:#1e293b;position:relative;overflow:hidden;margin-top:4px\">\n                <div style=\"position:absolute;left:50%;top:0;bottom:0;width:1px;background:#475569\"><\u002Fdiv>\n                <div style=\"position:absolute;top:0;bottom:0;left:{{ fr.barLeft }}%;width:{{ fr.barW }}%;background:{{ fr.col }};border-radius:3px;transition:all 0.3s\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:9px;color:#64748b;margin-top:2px\">{{ fr.detail }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:10px\">\n            <span style=\"font-size:12.5px;font-weight:800;color:#f8fafc\">Movimiento esperado total (μ)<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:800;color:{{ sigCol }}\">{{ sigMu }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-top:10px;border-top:1px solid #0f172a;padding-top:10px\">\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Desviación típica esperada para 90 min. Vol combinada = 0,5·realizada intradía DAX + 0,5·(1,1·VIX), anualizada; σ90 = vol/√252 × √(1,5h/8,5h), ensanchada un 4 % por punto de riesgo de agenda. Suelo 0,12 %.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">σ 90 MIN (VOL {{ mathVdax }})<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:#e2e8f0\">{{ mathSigma }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Señal en unidades de volatilidad: z = μ / σ90. |z| &gt; 1 significa que la señal supera el ruido esperado de la ventana; alimenta la probabilidad y la convicción.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">Z = μ / σ<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:#e2e8f0\">{{ mathZ }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Conversión de z a probabilidad direccional con función logística de pendiente 1,15, acotada 15–85 %: el modelo nunca afirma certeza por diseño.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">P = LOGIT(1,15·Z), 15–85 %<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:{{ sigCol }}\">{{ sigProb }} %<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Doble condición para operar: probabilidad ≥ umbral configurado (Tweaks) y EV neto positivo tras spread. Si falla cualquiera, el panel marca SIN VENTAJA OPERABLE.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">UMBRAL OPERATIVO<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:#e2e8f0\">p ≥ {{ mathThreshold }} % y EV &gt; 0<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"Extensión orientativa de μ a la sesión completa: μ_día ≈ 1,85·μ + 0,10·tendencia 2 días, acotado ±2,2 %. Base de la previsión DÍA SIG. de cada empresa (βᵢ·μ_día + 1,5·tilt propio). No es la señal operativa de la ventana.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">μ DÍA COMPLETO (ORIENT.)<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:{{ muDayCol }}\">{{ muDayStr }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(2,6,23,0.5);border:1px solid #0f172a;border-radius:9px;padding:8px 11px\" data-tip=\"μ final = ensemble de tres estimaciones independientes: {{ ensNote }}. Bloques = suma ponderada de los 19 bloques; bottom-up = Σ peso × (β·μ + tilt) de las 40; regresión = modelo directo del movimiento 9:00–10:30 calibrado con 60 días de intradía real.\">\n              <div style=\"font-size:9px;color:#64748b;font-weight:700;letter-spacing:0.08em\">μ ENSEMBLE (3 MODELOS)<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;color:#e2e8f0;line-height:1.5\">bloq {{ muBlocksStr }}<br>b-up {{ muBUStr }} · reg {{ muRegStr }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:10px;border-top:1px solid #0f172a;padding-top:10px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;flex-wrap:wrap\">\n              <h3 style=\"margin:0;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;font-weight:700\">Convicción objetiva · {{ convScore }}/100<\u002Fh3>\n              <span style=\"font-size:9.5px;color:#94a3b8;font-family:'IBM Plex Mono',monospace\">consenso ponderado de factores: {{ consensus }} % alineado con μ<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;gap:5px\">\n              <sc-for list=\"{{ convRows }}\" as=\"cv\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:8px\" data-tip=\"{{ cv.tip }}\">\n                  <span style=\"width:210px;font-size:10.5px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ cv.label }}<\u002Fspan>\n                  <span style=\"width:34px;font-size:9px;color:#64748b;font-family:'IBM Plex Mono',monospace\">×{{ cv.w }} %<\u002Fspan>\n                  <div style=\"flex:1;height:6px;border-radius:3px;background:#0b1224;overflow:hidden\">\n                    <div style=\"height:100%;width:{{ cv.barW }}%;background:{{ cv.col }};border-radius:3px;transition:all 0.3s\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"width:34px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:{{ cv.col }}\">{{ cv.v }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <p style=\"margin:7px 0 0;font-size:9.5px;color:#64748b\">Convicción = Σ componente × peso. ALTA ≥ 70, MEDIA ≥ 45. Es coherente con la probabilidad por construcción: la probabilidad direccional pesa un 35 % y el consenso de factores un 25 %.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Las 40 del DAX · tarjetas\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px;min-width:0\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px\">\n            <h2 style=\"margin:0;font-size:13px;font-weight:800;color:#f8fafc\">Las 40 del DAX · precio, gráfico y previsión<\u002Fh2>\n            <span style=\"font-size:9.5px;color:#64748b;font-family:'IBM Plex Mono',monospace\">Bottom-up Σ peso × prev. 1,5 h: <span style=\"color:{{ buMuCol }};font-weight:700\">{{ buMu }}<\u002Fspan> vs. μ modelo {{ sigMu }} · clic para analizar<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px\">\n            <sc-for list=\"{{ cards40 }}\" as=\"t\" hint-placeholder-count=\"12\">\n              <button data-s=\"{{ t.sym }}\" sc-camel-on-click=\"{{ onSelCo }}\" aria-pressed=\"{{ t.pressed }}\" data-tip=\"{{ t.tip }}\" style=\"background:{{ t.bg }};border:1px solid {{ t.bord }};border-radius:10px;padding:9px 10px;cursor:pointer;text-align:left;transition:all 0.2s;min-width:0\" style-hover=\"border-color:#38bdf8\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#f8fafc\">{{ t.tk }}<\u002Fspan>\n                  <span style=\"font-size:9px;color:#64748b;font-family:'IBM Plex Mono',monospace\">{{ t.w }} %<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:9px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:1px 0 4px\">{{ t.name }}<\u002Fdiv>\n                <svg sc-camel-view-box=\"0 0 100 26\" sc-camel-preserve-aspect-ratio=\"none\" style=\"width:100%;height:26px;display:block\">\n                  <polyline points=\"{{ t.spark }}\" fill=\"none\" stroke=\"{{ t.chgColRaw }}\" stroke-width=\"1.4\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n                <\u002Fsvg>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#e2e8f0\">{{ t.price }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:{{ t.chgColRaw }}\">{{ t.chg }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px\">\n                  <span style=\"font-size:8px;color:#64748b;font-weight:700\">1,5 H <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:{{ t.predCol }}\">{{ t.pred }}<\u002Fspan><\u002Fspan>\n                  <span style=\"font-size:8px;color:#64748b;font-weight:700\">DÍA SIG. <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:{{ t.pred1dCol }}\">{{ t.pred1d }}<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px\">\n                  <span style=\"font-size:8px;color:#64748b;font-weight:700\">CONTRIB. HOY<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#94a3b8\" title=\"Contribución al DAX en puntos\">{{ t.contrib }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section data-screen-label=\"Análisis Top 10\" style=\"background:rgba(15,23,42,0.72);border:1px solid #1e293b;border-radius:14px;padding:16px;min-width:0\">\n          <h2 style=\"margin:0 0 3px;font-size:13px;font-weight:800;color:#f8fafc\">Análisis en profundidad · Top 10 por peso<\u002Fh2>\n          <p style=\"margin:0 0 9px;font-size:10.5px;color:#64748b\">7 métricas intradía por empresa · drivers, perfil, noticias y momentum de TODAS las 40 alimentan el bloque \"Las 40\" y la previsión por empresa<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1.1fr 50px 50px 42px 50px 34px 30px 26px 52px 52px 48px;gap:5px;font-size:8px;font-weight:700;letter-spacing:0.04em;color:#475569;padding-bottom:4px;border-bottom:1px solid #1e293b\">\n            <span>EMPRESA<\u002Fspan><span style=\"text-align:right\">% DÍA<\u002Fspan><span style=\"text-align:right\">GAP<\u002Fspan><span style=\"text-align:right\">RANGO<\u002Fspan><span style=\"text-align:right\">MOM 2ª<\u002Fspan><span style=\"text-align:right\">VOL R.<\u002Fspan><span style=\"text-align:right\">β<\u002Fspan><span style=\"text-align:right\">NWS<\u002Fspan><span style=\"text-align:right\">PREV 1,5H<\u002Fspan><span style=\"text-align:right\">PREV DÍA<\u002Fspan><span style=\"text-align:right\">CONTRIB.<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ deepRows }}\" as=\"dr\" hint-placeholder-count=\"10\">\n            <button data-s=\"{{ dr.sym }}\" sc-camel-on-click=\"{{ onSelCo }}\" data-tip=\"{{ dr.tip }}\" style=\"width:100%;display:grid;grid-template-columns:1.1fr 50px 50px 42px 50px 34px 30px 26px 52px 52px 48px;gap:5px;align-items:center;padding:4.5px 0;border:none;border-bottom:1px solid #0f172a;background:transparent;cursor:pointer;text-align:left;transition:background 0.2s;font-family:'IBM Plex Mono',monospace;font-size:9.5px\" style-hover=\"background:rgba(30,41,59,0.5)\">\n              <span style=\"font-family:'Archivo',sans-serif;font-size:10.5px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ dr.name }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ dr.chgCol }}\">{{ dr.chg }}<\u002Fspan>\n              <span style=\"text-align:right;color:{{ dr.gapCol }}\">{{ dr.gap }}<\u002Fspan>\n              <span style=\"text-align:right;color:{{ dr.posCol }}\">{{ dr.pos }}<\u002Fspan>\n              <span style=\"text-align:right;color:{{ dr.mom2Col }}\">{{ dr.mom2 }}<\u002Fspan>\n              <span style=\"text-align:right;color:#94a3b8\">{{ dr.volCo }}<\u002Fspan>\n              <span style=\"text-align:right;color:#94a3b8\">{{ dr.beta }}<\u002Fspan>\n              <span style=\"text-align:right;color:{{ dr.newsCol }}\">{{ dr.news }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ dr.predCol }}\">{{ dr.pred }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ dr.pred1dCol }}\">{{ dr.pred1d }}<\u002Fspan>\n              <span style=\"text-align:right;font-weight:700;color:{{ dr.contribCol }}\">{{ dr.contrib }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <p style=\"margin:7px 0 0;font-size:9px;color:#475569\">GAP = apertura propia vs. cierre previo · RANGO = posición en el rango del día · MOM 9.5px;font-weight:700;cursor:pointer;transition:all 0.2s\" style-hover=\"border-color:#38bdf8\">{{ toggle40Label }}<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 58px 44px 62px 34px;gap:5px;font-size:8.5px;font-weight:700;letter-spacing:0.06em;color:#475569;padding-bottom:4px;border-bottom:1px solid #1e293b\">\n            <span>EMPRESA<\u002Fspan><span style=\"text-align:right\">% DÍA<\u002Fspan><span style=\"text-align:right\">PESO<\u002Fspan><span style=\"text-align:right\">CONTRIB.<\u002Fspan><span style=\"text-align:right\">NEWS<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ comp40 }}\" as=\"co\" hint-placeholder-count=\"10\">\n            <button data-s=\"{{ co.sym }}\" sc-camel-on-click=\"{{ onSelCo }}\" aria-pressed=\"{{ co.pressed }}\" data-tip=\"{{ co.tip }}\" style=\"width:100%;display:grid;grid-template-columns:1fr 58px 44px 62px 34px;gap:5px;align-items:center;padding:4.5px 0;border:none;border-bottom:1px solid #0f172a;background:{{ co.bg }};cursor:pointer;text-align:left;transition:background 0.2s\" style-hover=\"background:rgba(30,41,59,0.5)\">\n              <span style=\"font-size:10.5px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ co.name }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:{{ co.chgCol }}\">{{ co.chg }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#94a3b8\">{{ co.w }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:700;color:{{ co.contribCol }}\">{{ co.contrib }}<\u002Fspan>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:{{ co.nCol }}\">{{ co.n }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div
